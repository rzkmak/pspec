name: Publish to npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Validate release tag and choose npm dist-tag
        id: release_meta
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          NORMALIZED_TAG=${RELEASE_TAG#v}

          if [ "$NORMALIZED_TAG" != "$PACKAGE_VERSION" ]; then
            echo "Release tag '$RELEASE_TAG' does not match package.json version '$PACKAGE_VERSION'." >&2
            exit 1
          fi

          DIST_TAG=$(node -e "const version = process.argv[1]; const match = version.match(/-([0-9A-Za-z-]+)(?:\.|$)/); process.stdout.write(match ? match[1].toLowerCase() : 'latest');" "$NORMALIZED_TAG")

          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Publish package to npm
        run: npm publish --provenance --tag "${{ steps.release_meta.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
