name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  id-token: write

concurrency:
  group: auto-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version bump
        id: version
        run: |
          NEW=$(cat package.json | jq -r '.version')
          PREV=$(git show HEAD~1:package.json | jq -r '.version')
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "prev=$PREV" >> $GITHUB_OUTPUT
          if [ "$NEW" != "$PREV" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $PREV → $NEW"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $NEW"
          fi

      - name: Check if release already exists
        if: steps.version.outputs.changed == 'true'
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.new }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.new }} already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release ${{ steps.version.outputs.new }} does not exist"
          fi

      - name: Determine prerelease
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        id: meta
        run: |
          if [[ "${{ steps.version.outputs.new }}" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "Detected prerelease version"
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "Detected stable version"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS="--generate-notes"
          if [ "${{ steps.meta.outputs.prerelease }}" == "true" ]; then
            FLAGS="$FLAGS --prerelease"
          fi
          gh release create "${{ steps.version.outputs.new }}" \
            --title "${{ steps.version.outputs.new }}" \
            $FLAGS
          echo "Created release ${{ steps.version.outputs.new }}"

      - name: Set up Node.js
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: npm ci

      - name: Run test suite
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: npm test

      - name: Determine npm dist-tag
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        id: release_meta
        run: |
          DIST_TAG=$(node -e "const version = process.argv[1]; const match = version.match(/-([0-9A-Za-z-]+)(?:\.|$)/); process.stdout.write(match ? match[1].toLowerCase() : 'latest');" "${{ steps.version.outputs.new }}")
          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"

      - name: Publish package to npm
        if: steps.version.outputs.changed == 'true' && steps.check.outputs.exists == 'false'
        run: npm publish --provenance --tag "${{ steps.release_meta.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
