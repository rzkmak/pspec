name: Bug report
description: Report a reproducible problem with pspec.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the smallest sequence that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Use ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: pspec version
      placeholder: e.g. 0.0.7
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 20.12.2

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      multiple: true
      options:
        - macOS
        - Linux
        - Windows
        - Claude Code
        - Gemini CLI
        - Cursor
        - OpenCode
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant terminal output, stack traces, or screenshots.
      render: shell
